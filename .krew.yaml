apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: ditto
spec:
  version: {{ .TagName }}
  homepage: https://github.com/rawkode/kubectl-ditto
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      {{addURIAndSha "https://github.com/rawkode/kubectl-ditto/releases/download/{{ .TagName }}/kubectl-ditto-darwin-amd64.tar.gz" .TagName }}
      bin: kubectl-ditto
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      {{addURIAndSha "https://github.com/rawkode/kubectl-ditto/releases/download/{{ .TagName }}/kubectl-ditto-darwin-arm64.tar.gz" .TagName }}
      bin: kubectl-ditto
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      {{addURIAndSha "https://github.com/rawkode/kubectl-ditto/releases/download/{{ .TagName }}/kubectl-ditto-linux-amd64.tar.gz" .TagName }}
      bin: kubectl-ditto
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      {{addURIAndSha "https://github.com/rawkode/kubectl-ditto/releases/download/{{ .TagName }}/kubectl-ditto-linux-arm64.tar.gz" .TagName }}
      bin: kubectl-ditto
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      {{addURIAndSha "https://github.com/rawkode/kubectl-ditto/releases/download/{{ .TagName }}/kubectl-ditto-windows-amd64.tar.gz" .TagName }}
      bin: kubectl-ditto.exe
  shortDescription: Generate YAML for any resource/CRD using cluster schema
  description: |
    Generate YAML manifests for any Kubernetes resource or CRD installed in
    your cluster. Uses the cluster's OpenAPI schema to produce accurate YAML
    with smart defaults, field descriptions as comments, and optional
    interactive prompts.

    Supports plural names, short names, kind names, and fully-qualified
    CRD names (e.g. certificates.cert-manager.io).

    Examples:
      kubectl ditto deployment -n default my-app
      kubectl ditto svc -n default my-service
      kubectl ditto certificates.cert-manager.io -n default my-cert
      kubectl ditto deployment -n default my-app --interactive
      kubectl ditto deployment -n default my-app --minimal
      kubectl ditto deployment -n default my-app --full
  caveats: |
    Requires an active cluster connection (uses current kubeconfig context).
    CRDs must be installed in the cluster for their schemas to be available.
