name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: kubectl-ditto-darwin-arm64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: kubectl-ditto-darwin-amd64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: kubectl-ditto-linux-arm64.tar.gz
            cross: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: kubectl-ditto-linux-amd64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: kubectl-ditto-windows-amd64.tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cp LICENSE target/${{ matrix.target }}/release/
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} kubectl-ditto LICENSE
        shell: bash

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cp LICENSE target/${{ matrix.target }}/release/
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} kubectl-ditto.exe LICENSE
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*

  krew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update krew-index
        uses: rajatjindal/krew-release-bot@v0.0.51
